<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup ELO - 2010</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Fredoka+One&display=swap" rel="stylesheet">
<script>
(function() {
  function faviconHref(isLocal) {
    var dash = isLocal ? ' stroke-dasharray="3 2.5"' : '';
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
      + '<circle cx="16" cy="16" r="14" fill="#F5F0E8" stroke="#1A5276" stroke-width="2.5"' + dash + '/>'
      + '<path d="M16,10 L21.7,14.2 L19.5,20.9 L12.5,20.9 L10.3,14.2 Z" fill="#1A5276"/>'
      + '</svg>';
    return 'data:image/svg+xml,' + encodeURIComponent(svg);
  }
  window.__setFavicon = function() {
    var isLocal = ['localhost', '127.0.0.1', ''].indexOf(location.hostname) !== -1;
    var link = document.querySelector('link[rel="icon"]');
    if (!link) {
      link = document.createElement('link');
      link.rel = 'icon';
      document.head.appendChild(link);
    }
    link.type = 'image/svg+xml';
    link.href = faviconHref(isLocal);
  };
  window.__setFavicon();
})();
</script>
<style>
/* Shared "cardboard cutout" nav component — Level 1-3's chip visual system,
   used by every page on the public site: the homepage (build_home.py) and
   every World Cup page (build.py). Single source of truth — see
   requirements/public.md -> Navigation for the spec this file implements.
   Page-specific Level 3 variants with their own unique layout (Rankings'
   on/off toggles, the Knockout round picker, etc.) keep their own CSS in
   shared.css instead; only what's identical everywhere lives here — including
   the .bool-toggle corner-dot variant (below), since any Level 1-3 chip
   might need it, not just World Cup pages'. Level 4
   (table/grid column headers) is not a chip row and isn't styled here —
   see shared.css / build.py for its own torn-strip treatment.

   This was originally piloted as a homepage-only experiment (irregular cut
   edges, tape on every chip, no color-flip on selection, black-marker-only
   text, varied paper color) before being promoted here to apply everywhere —
   see way-of-working.md history / requirements/public.md for that call.

   Also home to the site's universal fly in/out transition primitives
   (--fly-ms, .fly-panel, .fly-scroll-lock, below) — not chip styling, but
   this is the one CSS file loaded on every public page (homepage included;
   shared.css isn't), which is what these need to actually be universal. */

.page-nav { display: flex; flex-direction: column; width: 100%; gap: 10px; }

.view-toggle { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 10px; }

/* Each item is its own paper cutout, not a segment of a shared background:
   an irregular hand-cut outline (cycling through 4 distinct polygons by
   position, mod 4 — no two neighboring chips share the same cut), a hard
   offset shadow suggesting real thickness (poster board, not a thin sheet),
   and a small deterministic rotation (alternating by position, not random
   per page load). */
.view-toggle button, .view-toggle a, .view-toggle strong, .view-toggle span {
  --rot: 0deg;
  --chip-bg: #EFE6DA;
  display: inline-flex; align-items: center; justify-content: center;
  border: none; cursor: pointer; text-decoration: none; text-align: center; white-space: nowrap;
  font-family: 'Permanent Marker', cursive; font-size: 0.75rem; padding: 0.2rem 0.7rem;
  border-radius: 0;
  background: var(--chip-bg); color: #1A1A1A;
  box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.22);
  rotate: var(--rot);
  position: relative;
}
/* Selection's own lift (a stronger shadow, see the Selected rule below)
   needs a real transition duration — a physical pick-up is a quick motion,
   not an instant swap — see requirements/transitions.md -> Transitions ->
   "Selection is a motion, not a snap". Deliberately its own rule, wrapped
   in :where() to carry zero specificity, rather than folded into the base
   rule above: a plain `.view-toggle button { transition: ... }` would have
   specificity (0,1,1) — one class plus one type — which beats .fly-item's
   (0,1,0), so it would silently steal the whole `transition` property
   (translate/rotate timing and all) from any chip that's simultaneously
   flying, exactly the "resting-state rule outranks fly-transition rule"
   bug technical.md documents, just one level removed (which rule's
   `transition` *property* wins, rather than which rule's `translate`
   *value* wins). With :where()'s specificity of zero, .fly-item's own
   transition (translate, rotate) always wins whenever a chip is mid-fly,
   and this rule only ever supplies box-shadow timing the rest of the time.
   No `scale` here — selection doesn't change a chip's size at all (see the
   Selected rule below for why) — and no `rotate` either: a chip's rotation
   never actually changes on selection (the Selected rule repeats the same
   `var(--rot)`), so there's nothing for either to transition regardless. */
:where(.view-toggle button, .view-toggle a, .view-toggle strong, .view-toggle span) {
  transition: box-shadow 150ms ease-out;
}
.view-toggle strong, .view-toggle span.disabled { cursor: default; }

.view-toggle > :nth-child(odd) { --rot: -1.6deg; }
.view-toggle > :nth-child(even) { --rot: 1.4deg; }
.view-toggle > :nth-child(3n) { --rot: -0.8deg; }

/* Irregular hand-cut outline, cycling mod 4 — decoupled from the mod-5
   color cycle below so shape and color don't repeat in lockstep. */
.view-toggle > :nth-child(4n+1) { clip-path: polygon(2% 6%, 97% 0%, 100% 90%, 92% 100%, 5% 96%, 0% 16%); }
.view-toggle > :nth-child(4n+2) { clip-path: polygon(0% 3%, 93% 0%, 100% 94%, 7% 100%, 2% 88%, 0% 28%); }
.view-toggle > :nth-child(4n+3) { clip-path: polygon(4% 0%, 100% 5%, 96% 100%, 3% 95%, 0% 55%); }
.view-toggle > :nth-child(4n+4) { clip-path: polygon(0% 9%, 90% 0%, 100% 82%, 95% 100%, 6% 91%); }

/* Paper color variety — each position pulls a different sheet from the
   stack instead of one repeated color. Disabled chips are the exception
   (see below): they stay muted gray-tan regardless of position, so "not
   available yet" is never mistaken for a color choice. */
.view-toggle > :nth-child(5n+1):not(.disabled) { --chip-bg: #C0392B; }
.view-toggle > :nth-child(5n+2):not(.disabled) { --chip-bg: #1A5276; }
.view-toggle > :nth-child(5n+3):not(.disabled) { --chip-bg: #F4D03F; }
.view-toggle > :nth-child(5n+4):not(.disabled) { --chip-bg: #1E8449; }
.view-toggle > :nth-child(5n+5):not(.disabled) { --chip-bg: #E67E22; }

/* Tape on every chip — a physical scrap of board needs holding down
   whether or not it's the current selection; selection is differentiated
   below instead, by shadow alone (see the Selected rule below for why
   tape itself never resizes and a chip never does either). Size/angle/
   position cycle by position mod 7 — a length that shares no common
   factor with the shape cycle (mod 4) or color cycle (mod 5) above, so
   tape variety never lines up with either in lockstep; nothing
   hand-assembled repeats identically. */
.view-toggle > * {
  --tape-w: 26px; --tape-h: 11px; --tape-rot: -5deg; --tape-left: 50%;
}
.view-toggle > *::before {
  content: "";
  position: absolute; top: -8px; left: var(--tape-left);
  width: var(--tape-w); height: var(--tape-h); margin-left: calc(var(--tape-w) / -2);
  background: rgba(230, 225, 208, 0.8);
  border: 1px solid rgba(0, 0, 0, 0.05);
  transform: rotate(var(--tape-rot));
}
.view-toggle > :nth-child(7n+1) { --tape-w: 22px; --tape-h: 10px; --tape-rot: -7deg; --tape-left: 46%; }
.view-toggle > :nth-child(7n+2) { --tape-w: 32px; --tape-h: 13px; --tape-rot: 3deg;  --tape-left: 40%; }
.view-toggle > :nth-child(7n+3) { --tape-w: 24px; --tape-h: 11px; --tape-rot: 6deg;  --tape-left: 54%; }
.view-toggle > :nth-child(7n+4) { --tape-w: 34px; --tape-h: 13px; --tape-rot: -3deg; --tape-left: 50%; }
.view-toggle > :nth-child(7n+5) { --tape-w: 20px; --tape-h: 9px;  --tape-rot: 8deg;  --tape-left: 44%; }
.view-toggle > :nth-child(7n+6) { --tape-w: 28px; --tape-h: 12px; --tape-rot: -6deg; --tape-left: 58%; }
.view-toggle > :nth-child(7n+7) { --tape-w: 26px; --tape-h: 11px; --tape-rot: 2deg;  --tape-left: 48%; }

/* Selected — no recolor (background stays whatever this chip already drew
   from the palette above); lifts with a stronger, harder-edged shadow, the
   real optical consequence of a physical chip sitting slightly higher off
   the board (farther from the surface it's casting a shadow onto) — see
   brand-guidelines.md -> Typography Principles and -> Layout -> "nothing
   floats". Deliberately shadow only, no size change: a real piece of paper
   doesn't grow because it got picked up or chosen — there's no physical
   action that makes paper physically larger, so a scale-up here would be a
   borrowed digital-UI convention (a button's :active "pop"), not a
   materials-based one, however smoothly it's animated. This is the same
   category of mistake this project already ruled out once for hover, via a
   different property: a translateY lift was tried and rejected because "a
   lift reads as the chip floating off the board" — scale-on-select is that
   same instinct wearing `scale` instead of `translate`. Animated by the
   base rule's own `transition: box-shadow` above, not an instant class
   swap — a real hand doesn't teleport a chip to its picked-up shadow (see
   requirements/transitions.md -> Transitions -> "Selection is a motion, not
   a snap"). Tape is exactly whatever piece this chip already had — real
   tape doesn't grow because the thing under it got picked up, so selection
   is shadow only, never a tape resize. Text stays the same near-black —
   marker only comes in black, so a colored background never flips to
   white text. Covers both single-choice "current selection" and
   multi-select "shown" (a currently-visible Knockout round) — both mean
   "this is on." */
.view-toggle button.active, .view-toggle a.active, .view-toggle strong.active {
  box-shadow: 4px 6px 0 rgba(0, 0, 0, 0.3);
  rotate: var(--rot);
  z-index: 2;
}

/* Independent on/off toggles (Show eliminated, True rank, the debug toggle,
   each Knockout round chip) — the same chip + Selected treatment above,
   plus a small dot sticker in the corner: muted gray off, brand green on.
   Distinguishes "this is its own switch" from plain tab selection above,
   where highlighting one chip already implies the others are not chosen. */
.view-toggle .bool-toggle::after {
  content: "";
  position: absolute; top: 3px; right: 5px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #B9AF9E;
  border: 1px solid rgba(0, 0, 0, 0.25);
}
.view-toggle .bool-toggle.active::after {
  background: #27AE60;
}

/* Disabled — muted, flatter than a live chip, no hover, dimmed near-black
   text (never nav.css's old washed-out white — marker-only-black applies
   here too). Used for an item with no destination yet (the homepage's
   `Hockey`/`Swimming`, the other three football competitions) and the
   Groups placeholder note. */
.view-toggle span.disabled {
  --chip-bg: #B9AF9E;
  color: rgba(26, 26, 26, 0.55);
  box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.12);
}

/* Level 2 — the single most visually dominant level, wherever it appears
   (the homepage's Football competition row, World Cup pages' tournament-year
   list, History's Final 4/8/16 round switch): bigger font/padding than every
   other level, applied to every item type alike (including disabled spans)
   so nothing in this row renders at a different size than its siblings.
   Dominance comes from size alone now — it shares the same varied paper
   color / black text system as every other level rather than a special
   always-red default. */
.primary-tabs.view-toggle > * { font-size: 0.95rem; padding: 0.45rem 1.1rem; }

/* Universal transition duration — the single source of truth for pacing,
   see requirements/public.md -> Navigation -> Transitions. A unitless
   number (not "850ms") so JS can read it back with a plain parseFloat on
   the computed style with no unit-string parsing — see FLY_MS in
   shared.js and build.py's history script, both of which derive their
   setTimeout delay from this instead of hardcoding a matching number.
   Change the pace in exactly this one place.

   --fly-distance/--fly-rotate are the other two numbers every fly
   mechanism on the site shares (always fully off-screen, always the same
   spin) — .fly-panel/.fly-item below read them, and so does build_home.py's
   .home-group (loaded after this file on the homepage, see
   build_home_html()), rather than each hand-copying "105vw"/"8deg"
   separately. That duplication used to be real — .home-group carried its
   own literal copies of these two values plus its own --fly-ms-equivalent
   duration — and was exactly why a past bug (see "A resting-state rule
   must never outrank a fly-transition rule" below) needed the same fix
   applied twice by hand instead of once. */
:root { --fly-ms: 850; --fly-distance: 105vw; --fly-rotate: 8deg; }

/* Shared "fly panel" swap mechanism — the universal board-level transition
   speed *and* distance, see requirements/public.md -> Navigation ->
   Transitions -> "Chrome only moves when the chrome itself is changing".
   Any page applies these classes to whatever board it's swapping (a whole
   view, the homepage's Sports!/Football groups) so both only ever need to
   change in one place. Always flies fully off-screen (105vw) — production
   feedback said a modest nearby shift didn't read as "flying in," it read
   as barely moving. Pair this with `.fly-scroll-lock` (below) on whatever
   scrollable ancestor the panel lives inside (a `.table-wrap`, `.bracket`,
   or `body` itself) for the transition's duration — an off-screen
   translateX briefly inflates that ancestor's scrollable area otherwise,
   since scrollable overflow is computed from an element's transformed
   position. JS should also clear these classes back to no-transform once a
   panel settles rather than leaving `translate: 0 0` sitting on it forever
   — a non-`none` translate/rotate/scale still establishes a new containing
   block the same way `transform` does, which would silently break any
   `position: fixed` descendant (see #rank-info in build.py) from that
   point on. See .fly-item below for the separate, much smaller per-item
   primitive used for everything that isn't a board-level swap (a table's
   individual rows, a bracket's game cards, a confederation panel's
   individual cells). */
/* Never opacity — see brand-guidelines.md -> Motion: physical paper
   doesn't dissolve, it slides. A panel stays fully opaque throughout;
   leaving/entering the frame is what makes it disappear/appear. */
/* translate/rotate here are the standalone CSS properties, not the
   `transform` shorthand — deliberately, so a fly-panel move can never be
   silently overridden by a chip's own resting/selected look. A board or
   item can be mid-swap while also carrying .active (the outgoing view's
   own selected tab, the just-arrived default round's tab), and
   .view-toggle button.active/.strong.active (above) sets its own `rotate`
   for the "picked up" look — if this fly mechanism also used `transform`,
   whichever rule's shorthand won would silently discard the other's value
   entirely (that's exactly what happened before this was split: an
   !important arms race, one bug already found and fixed that way — see
   technical.md -> "A resting-state rule must never outrank a
   fly-transition rule"). With `translate` as its own property, nothing
   else in this file ever sets it, so it can never lose that fight,
   structurally, not by convention. `rotate` is still shared with the
   chip's own resting/selected rotation, so it keeps !important to make
   sure the fly's spin wins that one property while airborne — but even if
   a future rule got that priority wrong, the item would still visibly fly
   (just with the wrong spin angle), never stay stuck in place. */
.fly-panel { transition: translate calc(var(--fly-ms) * 1ms) linear, rotate calc(var(--fly-ms) * 1ms) linear; }
.fly-panel.fly-out { translate: var(--fly-distance) 0; rotate: var(--fly-rotate) !important; }
.fly-panel.fly-in-start { translate: calc(var(--fly-distance) * -1) 0; rotate: calc(var(--fly-rotate) * -1) !important; transition: none !important; }
.fly-panel.fly-in-active { translate: 0 0; rotate: 0deg !important; transition: translate calc(var(--fly-ms) * 1ms) cubic-bezier(.1,.6,.2,1), rotate calc(var(--fly-ms) * 1ms) cubic-bezier(.1,.6,.2,1); }

/* Item-level fly — "the invisible hands" (see brand-guidelines.md -> Motion)
   picking up or placing one row/card/cell at a time, as opposed to
   .fly-panel's board-level move above sliding the whole board as one
   piece. Same distance/direction as .fly-panel though — fully off-screen,
   out to the right and in from the left, same one-way conveyor — a small
   nearby shift reads as barely moving rather than "flying," the exact
   lesson .fly-panel's own distance was already tuned against (see
   requirements/public.md -> Navigation -> Transitions). What's different
   at item scale is speed, not distance: a small light item is quicker for
   the invisible hand to move than a whole board, hence its own shorter
   --fly-item-ms rather than reusing --fly-ms. Callers set their own
   `transition-delay` inline per element for the random-jitter stagger (see
   requirements/public.md -> Transitions -> "Stagger") — deliberately not
   built into these classes, since the jitter is randomized per occurrence,
   not a fixed site-wide constant the way --fly-item-ms is. */
:root { --fly-item-ms: 420; }
.fly-item { transition: translate calc(var(--fly-item-ms) * 1ms) linear, rotate calc(var(--fly-item-ms) * 1ms) linear; }
.fly-item.fly-item-out { translate: var(--fly-distance) 0; rotate: var(--fly-rotate) !important; }
.fly-item.fly-item-in-start { translate: calc(var(--fly-distance) * -1) 0; rotate: calc(var(--fly-rotate) * -1) !important; transition: none !important; }
.fly-item.fly-item-in-active { translate: 0 0; rotate: 0deg !important; transition: translate calc(var(--fly-item-ms) * 1ms) cubic-bezier(.1,.6,.2,1), rotate calc(var(--fly-item-ms) * 1ms) cubic-bezier(.1,.6,.2,1); }

/* Applied to a scrollable ancestor (never the flying panel itself) for
   exactly the transition's duration — see the comment above. */
.fly-scroll-lock { overflow-x: hidden !important; }

/* Cross-page navigation (Home <-> History) is NOT done via the browser's
   native cross-document View Transitions API — that was tried first and
   rejected: its only real primitive is a single whole-page snapshot, which
   arrives pre-assembled as one image, exactly the "component dropped in"
   effect requirements/public.md -> Cross-page navigation and
   brand-guidelines.md -> Motion -> "Walking to a different poster" rule
   out. It's replaced by a hand-rolled click-intercept + sessionStorage +
   per-item fly (see fly.js, and build.py/build_home.py's own click
   handlers) so every nav chip and content piece flies individually instead
   of the page arriving as one image. */

/* Shared styles for all World Cup pages */

/* Reserves the vertical scrollbar's gutter unconditionally, on every page,
   regardless of whether that page's own content is actually tall enough to
   need one. Without this, body's max-width + margin:0 auto centering below
   gets a different amount of horizontal space to work with depending on
   whether a scrollbar happens to be showing — a tournament page's default
   Match List view runs ~4700px tall, History's own table is only ~1200px,
   so crossing that threshold differently between the two shifts the whole
   centered column sideways by the scrollbar's width the instant one loads,
   which is exactly the kind of motion a chip the reader was told never
   moves (see requirements/transitions.md -> "The general rule") should
   never have — the chip itself never gets a transform either page, the
   ground under it does. */
html { scrollbar-gutter: stable; }
body { font-family: 'Fredoka One', cursive; font-size: 1rem; line-height: 1.5; background: #F5F0E8; color: #1a1a1a; max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 4rem; overflow-x: auto; }
h1 { font-family: 'Permanent Marker', cursive; font-size: 2.2rem; margin: 0.5rem 0 1rem; }
a { color: #1A5276; }
table { border-collapse: collapse; margin-top: 1rem; font-size: 0.9rem; white-space: nowrap; }
.table-wrap { overflow-x: auto; }
/* Match List's table is Level 4, fused flush under Level 3 with no gap
   (see .page-nav) — this table specifically overrides the generic
   margin-top above so nothing but the nav's own border sits between them.
   .table-wrap (not the table itself) is what scrolls horizontally when the
   confederation columns need more room than the nav's width allows, so the
   page — and the nav above it — never grows wider than Levels 1-3. */
#matches-view table { margin-top: 0; }
th, td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid #ddd; }
/* Level 4 header row (see requirements/navigation.md -> Level 4) — red
   background, but near-black text, not white: real marker only comes in
   black (../nav.css's chip rule says the same thing), and that holds for
   every red Level 4 strip sitewide, not just chips. */
th { font-family: 'Permanent Marker', cursive; background: #C0392B; color: #1a1a1a; position: sticky; top: 0; z-index: 2; height: 2.5rem; vertical-align: middle; }
.num { text-align: right; }
.narrow { text-align: center; }
.spacer { padding: 0 0.3rem; }
.score-sep { text-align: center; padding: 0 0.2rem; }
.elo { text-align: left; }
.flag { text-align: center; }
.flag .icon { display: inline-block; width: 2.2em; height: 1.5em; background-size: cover; background-position: center; background-repeat: no-repeat; vertical-align: middle; border: 1px solid #ccc; filter: saturate(0.8); }
/* Marks a Match List row's individually-flyable pieces (a score, an ELO
   figure, a still-pending knockout slot's label) for cross-page nav — see
   shared.js's flagCellHtml/gameRowCells and requirements/public.md ->
   Navigation -> Cross-page navigation. inline-block so translate/rotate
   (../nav.css's .fly-item) has a box to move without disturbing the
   surrounding <td>'s own text-align. The flag icon needs no separate rule
   here — .flag .icon above already sets inline-block, and .ml-inner is
   just an additional class on that same span, not a second wrapper. */
.ml-inner { display: inline-block; }
.conf { text-align: center; min-width: 5em; }
.conf-first { border-left: 2px solid rgba(255,255,255,0.3); }

/* Sticky-note name label shown on flag hover (see ../fly.js) — replaces the
   browser's native title tooltip everywhere a flag appears (Match List,
   Knockout, History), see requirements/public.md -> World Cup pages ->
   Flags -> "Name on hover". Same #FAD7A0 material as the W/D/L diff
   highlight's sticky (see shared.js's renderWld) — one sticky-note look
   reused rather than a second one invented for this. position:fixed since
   fly.js positions it from getBoundingClientRect(), which is
   viewport-relative. */
.flag-name-note {
  position: fixed;
  z-index: 1000;
  background: #FAD7A0;
  color: #1a1a1a;
  font-size: 0.75rem;
  padding: 0.15rem 0.45rem;
  white-space: nowrap;
  box-shadow: 1px 2px 3px rgba(0,0,0,0.25);
  pointer-events: none;
}

/* Level 1 (utility bar — Home, History), the .page-nav fused wrapper, the
   base .view-toggle look, and Level 2 (.page-toggle .primary-tabs — the
   tournament-year list) are all defined once in ../nav.css, shared with the
   homepage's own nav (see build_home.py) — see requirements/public.md ->
   Navigation. Only this page's own Level 3 (the Match List/Groups/Knockout/
   Rankings tabs, .detail-bar) and its own Level 3 variants (below) are
   specific to World Cup pages. */

tbody tr:hover { background: #EDE8DC; }

/* World Cup pages' own per-view detail-control rows — the active tab's own
   controls (a bracket-round picker, Rankings' toggles, a Groups placeholder
   note), rendered directly beneath Level 3 (the Match List/Groups/Knockout/
   Rankings tabs). Not one of the four numbered nav Levels (see
   requirements/navigation.md's Level table — Level 4 is reserved sitewide
   for table/grid column headers only), just page-specific content attached
   to whichever Level 3 tab is active; each has unique layout beyond the
   shared chip shape, so unlike Level 1/2/3 they aren't reusable as-is and
   keep their own CSS here. They're ordinary .view-toggle chip rows like
   every numbered level — see nav.css for the shared chip visual system —
   with no shared background or stretch-to-fill of their own; min-height
   alone reserves this row's space before JS populates it, so nothing jumps
   on first paint. */
.bracket-round-toggle, .match-view-toggle, .groups-view-toggle, .rankings-view-toggle { min-height: 2.5rem; }

/* Rankings */
#rankings-view { display: none; }
#rankings-view-toggle { display: none; }
/* Second tier for Rankings — moved out of the rankings panel itself (same
   move as Match List's old inline header toggle) so the panel starts clean.
   Left-aligned like every other chip row (see nav.css -> Layout) — Rank/
   Scale first, then the on/off toggles (.rankings-checks) after, not
   spread apart to fill the row's width. */
.rankings-view-toggle { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
/* Deliberately not one of the four chip palette colors (see nav.css ->
   Color) — a dedicated warning pink flags this as a developer-facing debug
   control regardless of its position in the color cycle. Scoped by id, not
   just class, so it reliably wins over the positional --chip-bg rules in
   nav.css regardless of source order (equal specificity otherwise). */
#rankings-view-toggle .debug-label { --chip-bg: #ffb3b3; }
/* No top padding/radius — Level 4 below (.rankings-header) fuses flush
   against Level 3 above with no gap, same as Match List's table. */
.rankings-panel { border: 1px solid rgba(0,0,0,0.08); border-radius: 0 0 6px 6px; background: rgba(255,255,255,0.35); padding: 0 0.8rem 0.3rem; }
.rankings-cols { font-size: 0.85rem; white-space: nowrap; }
/* This view's Level 4 (see requirements/public.md → Navigation) — red
   background, near-black text (never white — real marker only comes in
   black, see ../nav.css's chip rule and shared.css's `th` above) like every
   other Level 4. The negative left/right margin cancels .rankings-panel's
   padding so this bleeds all the way to the panel's edges, aligning with
   Levels 1-3 above instead of sitting inset. */
.rankings-header {
  display: grid;
  align-items: center;
  min-height: 2.5rem;
  /* grid-template-columns set dynamically by renderRankings() */
  position: sticky;
  top: 0;
  margin: 0 -0.8rem;
  background: #C0392B;
  color: #1a1a1a;
  z-index: 10;
}
.rankings-header > div { padding: 0.3rem 0.5rem; text-align: center; font-weight: bold; }
/* Dimmed near-black, not dimmed white — same opacity convention as
   ../nav.css's disabled chip text, reused here rather than inventing a
   second "de-emphasized on red" treatment. */
.rankings-header .axis-head { text-align: right; padding-right: 0.6rem; color: rgba(26, 26, 26, 0.55); }
.rankings-body { display: grid; /* grid-template-columns set dynamically by renderRankings() */ }
.scale-error { position: absolute; top: 4px; left: 0; right: 0; text-align: center; font-size: 0.7rem; color: #c00; pointer-events: none; }
.rankings-axis { position: relative; }
.axis-label {
  position: absolute;
  right: 0.4rem;
  font-size: 0.72rem;
  color: #555;
  font-weight: bold;
  transform: translateY(-50%);
  pointer-events: none;
}
.snap-body-col { position: relative; border-left: 1px solid #333; }
.grid-line { position: absolute; left: 0; right: 0; height: 1px; background: repeating-linear-gradient(to right, #bbb 0, #bbb 4px, transparent 4px, transparent 8px); pointer-events: none; z-index: 0; }
.debug-cluster { position: absolute; left: 4px; right: 4px; border: 2px solid red; border-radius: 3px; pointer-events: none; z-index: 9999; box-sizing: border-box; }
.rankings-header > div:not(.axis-head) { border-left: 1px solid rgba(255,255,255,0.3); }
.flag-pin {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
}
.flag-pin .icon {
  position: relative;
  display: block;
  width: 35px;
  height: 24px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid #ccc;
  box-sizing: border-box;
  cursor: default;
}
.flag-pin .elo-val { font-size: 0.72rem; color: #333; line-height: 1; }
.result-badge {
  display: none;
  position: absolute;
  bottom: -3px;
  right: -4px;
  align-items: center;
  line-height: 1;
  pointer-events: none;
}
.flag-highlighted .result-badge { display: flex; }
.result-letter {
  font-size: 6px;
  font-weight: bold;
  color: #fff;
  padding: 1px 2px;
}
.result-w .result-letter { background: #2e7d32; }
.result-l .result-letter { background: #c62828; }
.result-d .result-letter { background: #757575; }
.result-opp-flag {
  width: 18px;
  height: 12px;
  margin-left: 1px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 1px solid #fff;
  box-sizing: border-box;
}
#rankings-outer { position: relative; }
#rank-info {
  position: fixed;
  width: 130px;
  padding: 8px 10px;
  font-size: 0.75rem;
  line-height: 1.5;
  color: #eee;
  background: #1a1a1a;
  border-radius: 5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  visibility: hidden;
  min-height: 48px;
  pointer-events: none;
}
#rank-info .tip-flag { width: 80px; height: 54px; background-size: cover; background-position: center; border: 1px solid #555; margin-bottom: 8px; }
#rank-info .tip-name { font-weight: bold; font-size: 1rem; margin-bottom: 2px; }
#rank-info .tip-elo-val { color: #aaa; font-size: 0.8rem; margin-bottom: 8px; }
#rank-info .tip-sep { border: none; border-top: 1px solid #444; margin: 6px 0; }
#rank-info .tip-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 1px; }
#rank-info .tip-val { font-size: 0.85rem; color: #ddd; margin-bottom: 6px; }
#rank-info .tip-delta-pos { color: #6c6; }
#rank-info .tip-delta-neg { color: #f77; }

/* Groups — no controls yet, so Level 3 just holds a muted "coming soon"
   note (see .disabled below), kept present for visual consistency with the
   other three views' Level 3. */
#groups-view-toggle { display: none; }

/* Knockout bracket */
/* Round labels aren't one continuous bar the way a table header is (they're
   per-column, with gaps matching the bracket's own column gaps below), so
   unlike Match List/Rankings this view doesn't fuse its Level 4 flush
   against Level 3 above — this margin restores the breathing room that
   .page-nav's margin-bottom:0 removed. */
#knockout-view { display: none; margin-top: 1rem; }
#bracket-round-toggle { display: none; }
/* Which contiguous range of rounds to show. Shrinking only moves one edge in
   at a time (only the current edge round is clickable — see
   toggleBracketRound), but growing can jump straight to any hidden round in
   one click, revealing everything between it and the current edge — so the
   visible set can never have a gap in the middle. */
/* Each round's left/width is set inline by shared.js's
   alignBracketColumnsToToggles, matched exactly to its own toggle button's
   position/width above — not a fixed column size — rather than flowing
   left-to-right among whichever rounds are currently rendered. That's what
   keeps a round in the same horizontal spot regardless of which other
   rounds are shown/hidden (showing or hiding one never moves any other
   round sideways), and what keeps a column no wider than its own round
   needs (a narrow "Final" column stays narrow, not stretched to match
   "Round of 32"). .bracket needs its own height set by JS too
   (layoutBracketColumns) since absolutely-positioned children don't
   contribute to a parent's natural height the way flex/grid children do. */
/* overflow-y is hidden (not just visible/auto) so a round lifting up and
   off on hide (see shared.js's slideOutBracketColumns — real movement, per
   brand-guidelines.md -> Motion, never an opacity fade) clips cleanly at
   the top edge instead of floating up over the nav above. */
.bracket { position: relative; overflow-x: auto; overflow-y: hidden; padding: 0.4rem 0 1rem; }
.bracket-round { position: absolute; top: 0; display: flex; flex-direction: column; }
.bracket-round-games { flex: 1; display: flex; flex-direction: column; justify-content: space-around; }
/* Separation between one game and the next — no connector line into each
   game either (see below), so the gap itself is the only thing marking
   where one game ends and the next begins. */
.bracket-game-wrap { padding: 0.26rem 0; }
/* Every game, Final and 3rd Place included, is just its two
   flag+score rows — see requirements/public.md -> Knockout Bracket -> Game
   boxes. No box, no date on a regular game: a real bracket sketched on a
   poster wouldn't draw a card around every single game either, just the two
   results stacked. Centered, not left-hung, within the round's (now
   uniform-width — see Round toggles) column, the same way a photo is
   centered on a page rather than jammed against one edge. */
.bracket-team { display: flex; justify-content: center; align-items: center; padding: 0.05rem 0; }
.bracket-flag-wrap { position: relative; display: inline-block; }
.bracket-team .icon { display: block; width: 3.9em; height: 2.6em; background-size: cover; background-position: center; background-repeat: no-repeat; border: 1px solid #ccc; filter: saturate(0.8); }
/* The score is a sticky note stuck on the flag's own bottom-right corner —
   same #FAD7A0 material as every other sticky note on the site (the W/D/L
   diff highlight, the flag-name hover label — see shared.js's renderWld and
   ../fly.js), reused rather than inventing a fourth way to say "here's a
   number." A sibling of .icon, not a child of it, so the sticky's own tilt
   (shared.js's scoreStickyRotation, its own inline transform) is independent
   of the flag's own rotation (flagRotation, also its own inline transform)
   — the same reason the chip tape in nav.css has to be its own element
   rather than a rotated pseudo-element of a rotated parent. */
/* z-index: without it, this sticky and the *next* row's .bracket-flag-wrap
   are both "positioned, z-index:auto" in the same stacking context, so tree
   order alone decides the winner where they overlap — the later (lower)
   row's flag would silently paint over the sticky poking out of the row
   above it. A sticky note sits on top of whatever's under it, always, so it
   needs a real z-index rather than relying on DOM order to happen to work
   out. */
.bracket-score { position: absolute; bottom: -0.35em; right: -0.4em; z-index: 2; background: #FAD7A0; color: #1A1A1A; font-family: 'Permanent Marker', cursive; font-size: 0.85rem; min-width: 1.3em; line-height: 1.3em; text-align: center; padding: 0 0.15em; box-shadow: 1px 2px 3px rgba(0,0,0,0.25); }
/* An unresolved slot: same footprint as a real flag (so the row doesn't
   reflow once a result comes in), muted the same way any other
   not-yet-available item on the site is (nav.css's Disabled chip palette —
   #B9AF9E background, dimmed near-black text) rather than inventing a
   second "not ready yet" look. The "Winner of Game N"/"TBD" text lives on
   data-team now (see bracketTeamRowHtml), surfacing via the sitewide
   hover-name label like any other flag instead of being printed here. */
.bracket-flag-placeholder { display: flex; align-items: center; justify-content: center; width: 3.9em; height: 2.6em; background: #B9AF9E; border: 1px solid #ccc; font-family: 'Permanent Marker', cursive; font-size: 1.3em; color: rgba(26, 26, 26, 0.55); }

/* The Final and 3rd Place are the one exception — not a boxed card
   (every game in the tree, this pair included, is just its bare flag+score
   rows — see .bracket-simple above), just one thing on top of those same
   two rows: a small paper label announcing what the game is. No date, no
   card, no background of its own beyond the label itself — those two facts
   (which round, when) don't earn a whole separate card just because this
   pair of games matters more than the rest of the tree. .bracket-final only
   adds the positioning context the label needs. */
.bracket-final { position: relative; }
/* A scrap of paper laid diagonally across the seam between the two flags,
   not a header sitting above them — leaning toward the left side, its
   bottom-left corner over the top flag and its top-right corner over the
   bottom flag, the way a label actually dropped onto a stack of two photos
   would land across the join rather than floating above both. Red paper,
   near-black text (marker only comes in black — same rule as every chip,
   see navigation.md -> General nav chip characteristics -> Color), a hard
   offset shadow instead of a soft blur — every piece of this site is a
   physically assembled object (see brand-guidelines.md -> Materials), so
   this is its own scrap of paper rather than bare typeset text floating on
   top of the flags. z-index above both .bracket-score (2) and the flags
   themselves so it's never the thing that gets buried. */
.bracket-game-sub { position: absolute; top: 50%; left: 4%; z-index: 3; transform: translateY(-50%) rotate(-8deg); display: inline-block; font-family: 'Permanent Marker', cursive; font-size: 0.68rem; color: #1A1A1A; background: #C0392B; text-align: center; white-space: nowrap; padding: 0.15rem 0.5rem; box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }

/* Match List: unresolved knockout slot (see homeFrom/awayFrom) */
.tbd-slot { color: #948f81; font-style: italic; font-size: 0.72rem; }

</style>
<script src="fly.js"></script>
