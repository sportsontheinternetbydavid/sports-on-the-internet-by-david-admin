<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sports! On the Internet. By David</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Fredoka+One&display=swap" rel="stylesheet">
<script>
(function() {
  function faviconHref(isLocal) {
    var dash = isLocal ? ' stroke-dasharray="3 2.5"' : '';
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">'
      + '<circle cx="16" cy="16" r="14" fill="#F5F0E8" stroke="#1A5276" stroke-width="2.5"' + dash + '/>'
      + '<path d="M16,10 L21.7,14.2 L19.5,20.9 L12.5,20.9 L10.3,14.2 Z" fill="#1A5276"/>'
      + '</svg>';
    return 'data:image/svg+xml,' + encodeURIComponent(svg);
  }
  window.__setFavicon = function() {
    var isLocal = ['localhost', '127.0.0.1', ''].indexOf(location.hostname) !== -1;
    var link = document.querySelector('link[rel="icon"]');
    if (!link) {
      link = document.createElement('link');
      link.rel = 'icon';
      document.head.appendChild(link);
    }
    link.type = 'image/svg+xml';
    link.href = faviconHref(isLocal);
  };
  window.__setFavicon();
})();
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    line-height: 1.5;
    background: #F5F0E8;
    color: #1a1a1a;
  }

  /* Fused Level 1-3 nav — same component/rules as the World Cup pages
     (see requirements/public.md -> Navigation). Homepage is hand-authored
     (not a build artifact), so this is a self-contained copy rather than a
     shared stylesheet include. */
  .page-nav {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 100%;
    max-width: 1100px;
    margin: 0 auto;
  }

  .nav-level {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    background: #C0392B;
    min-height: 2.5rem;
  }

  .nav-level.level-1 { border-radius: 4px 4px 0 0; }
  .nav-level.level-2 { border-radius: 0; border-top: 1px solid rgba(0,0,0,0.15); }
  .nav-level.level-3 { border-radius: 0 0 4px 4px; border-top: 1px solid rgba(0,0,0,0.15); }

  .nav-level a, .nav-level strong, .nav-level span {
    flex: 1 1 auto;
    white-space: nowrap;
    text-align: center;
    font-family: 'Permanent Marker', cursive;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 0.2rem 0.7rem;
    font-size: 0.75rem;
    border-right: 1px solid rgba(255,255,255,0.4);
  }

  .nav-level a:last-child, .nav-level strong:last-child, .nav-level span:last-child {
    border-right: none;
  }

  .nav-level a:hover { background: rgba(255,255,255,0.18); color: #fff; }

  .nav-level strong.active {
    background: rgba(255,255,255,0.95);
    color: #C0392B;
  }

  .nav-level span.disabled {
    color: rgba(255,255,255,0.4);
    cursor: default;
  }

  .nav-level.level-2 a, .nav-level.level-2 strong {
    font-size: 0.95rem;
    padding: 0.45rem 1.1rem;
  }

  /* Header */
  .page {
    max-width: 800px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 5rem;
  }

  .site-header h1 {
    font-family: 'Permanent Marker', cursive;
    font-size: 3rem;
    color: #1a1a1a;
    line-height: 1.1;
    text-align: center;
  }

  .site-header .tagline {
    margin-top: 0.5rem;
    font-size: 1.1rem;
    color: #555;
    text-align: center;
  }
</style>
</head>
<body>
<div class="page-nav">
  <nav class="nav-level level-1">
    <strong class="active">Football</strong>
    <span class="disabled">Hockey</span>
    <span class="disabled">Swimming</span>
  </nav>
  <div class="nav-level level-2">
    <strong class="active">World Cup</strong>
  </div>
  <nav class="nav-level level-3">
    <a href="football/worldcup/history.html">History</a>
    <a href="football/worldcup/2026.html">Tournaments</a>
  </nav>
</div>
<div class="page">
  <header class="site-header">
    <h1>Sports! On the Internet. By David</h1>
    <p class="tagline">Sports data and visualizations. On the internet.</p>
  </header>
</div>
</body>
</html>
